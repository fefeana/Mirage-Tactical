<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth – Mirage Tactical</title>
    <!-- خطوط أنيقة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" 
      rel="stylesheet">
    <style>
      body {
        font-family: 'Rajdhani', sans-serif;
        background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      / خلفية متحركة /
      body::before {
        content: "";
        position: absolute;
        top: 0; left: 0;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 70%);
        animation: pulse 6s infinite alternate;
      }
      @keyframes pulse {
        from { transform: translate(-20%, -20%) scale(1); opacity: 0.5; }
        to { transform: translate(0%, 0%) scale(1.2); opacity: 0.8; }
      }
      .auth-box {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.05);
        padding: 2rem;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        width: 340px;
        animation: fadeIn 2s ease forwards;
      }
      h1, .signature, p, form {
        opacity: 0;
        animation: fadeInText 2s ease forwards;
      }
      h1 { animation-delay: 0.5s; }
      .signature { animation-delay: 1s; }
      p { animation-delay: 1.5s; }
      form { animation-delay: 2s; }
      @keyframes fadeInText {
        to { opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      input {
        display: block;
        width: 100%;
        margin: 0.5rem 0;
        padding: 0.7rem;
        border: none;
        border-radius: 8px;
      }
      .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
      }
      button {
        flex: 1;
        margin: 0 0.3rem;
        background: gold;
        border: none;
        padding: 0.8rem;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        opacity: 0;
        animation: fadeInText 2s ease forwards;
        animation-delay: 2.5s;
      }
      button:hover {
        background: #ffd700cc;
      }
    </style>
  </head>
  <body>
    <div class="auth-box">
      <h1>⚡ Mirage VPN</h1>
      <div class="signature">FMStar ✨ | 🌿 غصن الزيتون</div>
      <p>تسجيل الدخول أو إنشاء حساب جديد</p>
      <form>
        <input type="text" placeholder="اسم المستخدم" required />
        <input type="password" placeholder="كلمة المرور" required />
        <div class="btn-group">
          <button type="submit">دخول</button>
          <button type="button">تسجيل جديد</button>
        </div>
      </form>
    </div>
  </body>
</html>
