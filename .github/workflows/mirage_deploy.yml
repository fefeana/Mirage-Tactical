name: Full Mirage Pipeline

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ============================================================
  # 1️⃣ Build and Deploy Web UI
  # ============================================================
  build-web:
    name: 🌐 Build and Deploy Web UI
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies & Build UI
        run: |
          npm set progress=false
          npm install --no-fund --audit=false
          npm audit fix --force || true
          npm run build

      - name: 🚀 Deploy UI to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}"
          channelId: live
          entryPoint: './dist'

  # ============================================================
  # 2️⃣ Build Android APK (Depends on UI success)
  # ============================================================
  build-android:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 Build APK with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean assembleDebug

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirage-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # ============================================================
  # 3️⃣ Deploy Backend (Depends on APK success)
  # ============================================================
  deploy-backend:
    name: ☁️ Deploy Backend
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Backend Dependencies
        run: |
          cd backend
          npm set progress=false
          npm install --no-fund --audit=false
          npm audit fix --force || true

      - name: 🚀 Deploy Backend to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}"
          channelId: live
          entryPoint: './backend'

      - name: ✅ Notify success
        run: echo "🎉 Full pipeline executed successfully!"
