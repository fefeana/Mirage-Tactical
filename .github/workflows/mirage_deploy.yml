name: Mirage Full Pipeline (UI → APK → Backend)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ============================================================
  # 1️⃣  بناء ونشر الواجهة (UI)
  # ============================================================
  build-web:
    name: 🌐 Build & Deploy Web UI
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js (Modern)
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 📦 Install dependencies & Build UI
        run: |
          npm install
          npm run build

      - name: 🚀 Deploy UI to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}'   # ✅ تمت الإضافة
          channelId: live
          entryPoint: './dist'

  # ============================================================
  # 2️⃣  بناء APK (يعتمد على نجاح UI)
  # ============================================================
  build-android:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 Build APK with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirage-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # ============================================================
  # 3️⃣  نشر الـ Backend (يعتمد على نجاح APK)
  # ============================================================
  deploy-backend:
    name: ☁️ Deploy Backend
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js (Modern)
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: |
          cd backend
          npm install

      - name: 🚀 Deploy Backend to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}'   # ✅ تمت الإضافة
          channelId: live
          entryPoint: './backend'

      - name: ✅ Notify success
        run: echo "🎉 Full pipeline executed successfully on Node.js 24!"
