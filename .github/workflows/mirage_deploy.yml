name: Mirage OODA Pipeline
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build-web:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install and Build
        run: |
          rm -f package-lock.json
          npm install
          npm run build
      - name: Deploy UI
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}
          channelId: live
          entryPoint: ./dist
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirage-debug-apk
          path: app/build/outputs/apk/debug/*.apk
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install Dependencies
        run: |
          cd backend
          rm -f package-lock.json
          npm install
      - name: Deploy Backend
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}
          channelId: live
          entryPoint: ./
      - name: Done
        run: echo "Pipeline executed successfully!"
