// الكود الثاني – بعد الترتيب والتنظيف
public class SecondExample {
    public static void main(String[] args) {
        // السطر الأول
        System.out.println("شمس تشرق فوق الأفق");
        
        // السطر الثاني
        System.out.println("طريق يفتح أبواب الأمل");
        
        // السطر الثالث
        System.out.println("زهر يتفتح في الصباح");
        
        // السطر الرابع
        System.out.println("موجة تتراقص على الشاطئ");
        
        // السطر الخامس
        System.out.println("قمر يضيء ليل المدينة");
        
        // السطر السادس
        System.out.println("حلم يكتب قصة جديدة");
    }
}
