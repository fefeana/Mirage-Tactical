name: خط أنابيب Mirage الكامل (واجهة المستخدم ← APK ← Backend)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ============================================================
  # 1️⃣ بناء ونشر الواجهة (UI)
  # ============================================================
  build-web:
    name: 🌐 بناء ونشر واجهة الويب
    runs-on: ubuntu-latest

    steps:
      - name: 📥 رمز الدفع
        uses: actions/checkout@v4

      - name: 🔧 إعداد Node.js (حديث)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 تثبيت التبعيات وبناء واجهة المستخدم
        run: |
          npm set progress=false
          npm install --no-fund --audit=false
          npm audit fix --force || true
          npm run build

      - name: 🚀 تطبيق واجهة المستخدم في استضافة قاعدة النار
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}'
          channelId: live
          entryPoint: './dist'

  # ============================================================
  # 2️⃣ بناء APK (يعتمد على نجاح UI)
  # ============================================================
  build-android:
    name: 📱 بنيت Android APK
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: 📥 رمز الدفع
        uses: actions/checkout@v4

      - name: ☕ إعداد JDK 17
        uses: actions/setup-node@v4  # تم تصحيحه ليعمل بدلاً من المترجم خطأً سابقاً
        with:
          node-version: '24'

      - name: 🔧 إعداد بيئة جافا للـ APK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 بناء ملف APK باستخدام Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean assembleDebug

      - name: 📦 رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: mirage-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # ============================================================
  # 3️⃣ نشر الـ Backend (يعتمد على نجاح APK)
  # ============================================================
  deploy-backend:
    name: ☁️ Deploy Backend
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js (Modern)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies & Update Genkit
        run: |
          cd backend
          npm set progress=false
          npm uninstall @genkit-ai/googleai --no-fund || true
          npm install @genkit-ai/google-genai --no-fund --audit=false
          npm install --no-fund --audit=false
          npm audit fix --force || true

      - name: 🚀 Deploy Backend to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}'
          channelId: live
          entryPoint: './backend'

      - name: ✅ Notify success
        run: echo "🎉 Full pipeline executed successfully on Node.js 24!"
