name: Mirage OODA Pipeline
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: |
          rm -f package-lock.json
          npm install
          npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}
          channelId: live
          entryPoint: ./dist
  build-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/gradle-build-action@v3
        with:
          arguments: clean assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: mirage-debug-apk
          path: app/build/outputs/apk/debug/*.apk
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: |
          cd backend
          rm -f package-lock.json
          npm install
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}
          channelId: live
          entryPoint: ./
      - run: echo "OODA Pipeline Executed Successfully!"
