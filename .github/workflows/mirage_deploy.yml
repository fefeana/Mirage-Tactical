name: Build & Deploy Mirage Tactical

on:
  push:
    tags:
      - 'v*' # التحفيز عند إصدار نسخة تكتيكية جديدة

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # خطوة هامة: ضغط الأصول (Assets) لتقليل حجم الـ APK
      - name: Optimize Tactical Assets
        run: |
          echo "Optimizing Emerald UI Assets..."
          # هنا يمكن إضافة أوامر لضغط الصور أو تنظيف الملفات المؤقتة

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # أمر البناء الخاص بك مع تفعيل الـ JNI والـ NDK لمعمارية Dimensity (ARM64)
      - name: Build Tactical APK
        run: ./gradlew assembleRelease

      - name: Prepare Assets Directory
        run: |
          mkdir -p bin
          cp app/build/outputs/apk/release/*.apk bin/ || true
          # Ensure assets directory exists and is prepared
          mkdir -p assets
          mkdir -p protocols

      # اللمسة الزمردية: توقيع الـ APK (Signing)
      # لضمان أنه قابل للتثبيت مباشرة كنسخة رسمية
      - name: Sign Tactical APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: bin
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Mirage Tactical v2.0 ${{ github.ref_name }} 🟢🟣"
          tag_name: ${{ github.ref_name }}
          body: |
            ## [ Mirage OS - Tactical Deployment ]
            ---
            ### 🛠 Engine Updates:
            - **Kernel:** Optimized JNI for Dimensity 7200-Ultra (ARM64).
            - **Protocols:** Xray-core integrated with XTLS-Reality.
            - **UI:** Emerald Breathing Effect & Neon Glassmorphism.
            
            ### 🔐 Security:
            - Ghost Mode enabled by default.
            - Military-grade obfuscation via Shadow Routing.
          files: |
            bin/*.apk
            assets/**
            protocols/*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
