name: Mirage OS - Omni Core (UI & Tactical Deploy)

on:
  schedule:
    - cron: '0 * * * *' # تحديث Pulse الدوري كل ساعة
  push:
    tags:
      - 'v*' # النشر التكتيكي عند إصدار نسخة جديدة
  workflow_dispatch: # تشغيل يدوي للمناورة السريعة

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # المفتاح متاح الآن للنظام بالكامل ✅

jobs:
  mirage-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # --- المرحلة الأولى: تحديث Pulse والواجهة الزجاجية ---
      - name: Apply Emerald Glass UI
        run: |
          echo "Syncing Glassmorphism Assets..."
          # كود حقن السمات البصرية هنا
          
      # --- المرحلة الثانية: البناء التكتيكي (يحدث فقط عند وجود Tag أو تشغيل يدوي) ---
      - name: Build Tactical APK (ARM64)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # لضمان دمج الذكاء في مرحلة البناء

      # --- المرحلة الثالثة: التوقيع الرقمي (Signing) ---
      - name: Sign Tactical APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare Assets Directory
        run: |
          mkdir -p bin
          # التأكد من نسخ ملفات البروتوكولات لدمجها في النسخة النهائية
          mkdir -p protocols
          cp configs/*.json protocols/ || true 
          cp app/build/outputs/apk/release/*.apk bin/ || true

      # --- المرحلة الرابعة: النشر النهائي وتقرير الـ AI Sentinel ---
      - name: Global Tactical Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: "Mirage Tactical v2.0 - Emerald Edition 🟢🟣"
          tag_name: ${{ github.ref_name }}
          body: |
            ## [ Mirage OS - Tactical Deployment ]
            ---
            ### 🛠 Engine Updates:
            - **Kernel:** Optimized JNI for Dimensity 7200-Ultra.
            - **AI Sentinel:** Auto-Heal & Global Node Analysis Enabled ✅.
            - **Protocols:** Xray-core integrated with XTLS-Reality.
            
            ### 🔐 Security & UI:
            - **Ghost Mode:** Active stealth routing.
            - **Theme:** Neon Emerald & Purple Glassmorphism.
          files: |
            bin/*.apk
            protocols/*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # مهم جداً لربط التقرير النهائي بالذكاء
