name: Mirage Build & Deploy

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: 🛠️ Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4  # ✅ يعمل على Node.js 24

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4  # ✅ يعمل على Node.js 24
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧹 Clean & Build
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4  # ✅ يعمل على Node.js 24
        with:
          name: mirage-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  deploy-backend:
    name: ☁️ Deploy Backend
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4  # ✅ يعمل على Node.js 24

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6  # ✅ v6 يعمل على Node.js 24
        with:
          node-version: '24'  # ✅ Node.js 24

      - name: 📦 Install dependencies
        run: |
          cd backend
          npm install

      - name: 🚀 Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}'
          channelId: live
          entryPoint: './backend'

      - name: ✅ Notify success
        run: echo "🎉 Deployment successful!"
