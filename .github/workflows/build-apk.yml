name: 🎬 Mirage Video Processing Workflow

on:
  push:
    branches: [ "promo-video-v2", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gTTS moviepy numpy

      - name: Run Mirage Video Generator
        run: |
          python mirage_video_builder.py
