# ============================================================
# 🗡️ سيف ميراج - بناء APK مع دورة OODA
# ============================================================
name: ⚡ البارق الحقيقي - OODA APK Builder

# متى يتم تشغيل هذا السير؟
on:
  push:
    branches: [ main, master ]  # عند الدفع إلى الفرع الرئيسي
  workflow_dispatch:            # يسمح بالتشغيل اليدوي

# ============================================================
# المهام (Jobs)
# ============================================================
jobs:
  # ----------------------------------------------------------
  # المهمة الرئيسية: بناء APK
  # ----------------------------------------------------------
  build-apk:
    name: 📱 BUILD APK (مستقر)
    runs-on: ubuntu-latest

    # ==========================================================
    # الخطوات (Steps)
    # ==========================================================
    steps:
      # --------------------------------------------------------
      # 1. سحب الكود
      # --------------------------------------------------------
      - name: 🌀 سحب الكود
        uses: actions/checkout@v6

      # --------------------------------------------------------
      # 2. إعداد Java
      # --------------------------------------------------------
      - name: ☕ إعداد Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      # --------------------------------------------------------
      # 3. إعداد Flutter
      # --------------------------------------------------------
      - name: 🦋 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      # --------------------------------------------------------
      # 4. 🗡️ تشغيل سيف الخلق (ai_studio_code (5).sh)
      #    هذا هو الملف الموجود في المستودع والذي يملأ الملفات
      # --------------------------------------------------------
      - name: 🗡️ تشغيل سيف الخلق
        run: |
          echo "🔍 البحث عن سيف الخلق..."
          if [ -f "ai_studio_code (5).sh" ]; then
            echo "✅ تم العثور على السكربت، جعله قابلاً للتنفيذ..."
            chmod +x "ai_studio_code (5).sh"
            echo "🚀 تشغيل السكربت..."
            bash "ai_studio_code (5).sh"
          else
            echo "⚠️ السكربت غير موجود! سيتم إنشاء الملفات يدوياً..."
            # إنشاء مجلدات أساسية
            mkdir -p lib/core/ai lib/core/env lib/providers lib/screens
            # إنشاء main.dart بسيط
            cat > lib/main.dart << 'EOF'
            import 'package:flutter/material.dart';
            void main() => runApp(MyApp());
            class MyApp extends StatelessWidget {
              @override
              Widget build(BuildContext context) {
                return MaterialApp(home: Scaffold(body: Center(child: Text('Mirage Tactical'))));
              }
            }
            EOF
          fi

      # --------------------------------------------------------
      # 5. التحقق من الملفات
      # --------------------------------------------------------
      - name: 📂 التحقق من الملفات
        run: |
          echo "📄 محتويات مجلد lib:"
          ls -la lib/ || echo "⚠️ مجلد lib غير موجود!"
          echo "📄 محتويات pubspec.yaml:"
          head -10 pubspec.yaml || echo "⚠️ pubspec.yaml غير موجود!"

      # --------------------------------------------------------
      # 6. تثبيت المكتبات
      # --------------------------------------------------------
      - name: 📦 تثبيت المكتبات
        run: |
          flutter clean
          flutter pub get

      # --------------------------------------------------------
      # 7. بناء APK
      # --------------------------------------------------------
      - name: 🏗️ بناء APK
        run: flutter build apk --release --split-per-abi

      # --------------------------------------------------------
      # 8. رفع APK
      # --------------------------------------------------------
      - name: 📤 رفع APK
        uses: actions/upload-artifact@v6
        with:
          name: mirage-apk-final
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
