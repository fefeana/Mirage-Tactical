name: 🎬 Cinematic Video Generator

on:
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install pillow moviepy numpy

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinematic-promo-video
          path: mirage_promo_pro.mp4
          retention-days: 90

      - name: 🎬 Generate video
        run: python video_generator.py   # 👈 الـ run بآخر خطوة زي ما طلبت




