name: Mirage Promo Video Generator

on:
  push:
    branches:
      - promo-video-v2
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Video
        run: bash run_promo.sh

      - uses: actions/upload-artifact@v4
        with:
          name: mirage-promo-video
          path: mirage_promo_pro.mp4
          retention-days: 90
