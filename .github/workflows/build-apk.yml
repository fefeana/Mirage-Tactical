name: سيمفوني ميراج - UFO ألبارق بيل بايبلايب OODA ⚡🌌

on:
  push:
    branches: [ "main", "master" ]  # تأكد أن اسم الفرع الرئيسي صحيح
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # يسمح بالتشغيل يدوياً من تبويب Actions

jobs:
  # ============================================================
  # 🌌 OBSERVE & ORIENT (المراقبة والتوجيه)
  # ============================================================
  observe-and-orient:
    name: 🌌 OBSERVE & ORIENT
    runs-on: ubuntu-latest
    steps:
      - name: 🌀 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: ☕ إعداد Java (مطلوب لبناء أندرويد)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦋 إعداد Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'  # غيّرها لإصدارك
          channel: 'stable'
          cache: true

      - name: 📂 فحص هيكل المشروع
        run: |
          echo "✅ محتويات المجلد الحالي:"
          ls -la
          echo "🔍 هل يوجد pubspec.yaml؟"
          cat pubspec.yaml | head -5 || echo "⚠️ pubspec.yaml غير موجود!"

  # ============================================================
  # ⚡ DECIDE & BUILD (بناء الـ APK)
  # ============================================================
  build-apk:
    name: ⚡ DECIDE & BUILD (APK)
    runs-on: ubuntu-latest
    needs: observe-and-orient
    steps:
      - name: 🌀 سحب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦋 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ============================================================
      # 🗡️ هنا يقوم الساموراي بملء الملفات الفارغة (النقطة الأهم!)
      # ============================================================
      - name: 🗡️ تنفيذ سيف الخلق (ai_studio_code (5).sh)
        run: |
          echo "🔍 البحث عن السكربت..."
          if [ -f "ai_studio_code (5).sh" ]; then
            echo "✅ تم العثور على السكربت، جعله قابلاً للتنفيذ..."
            chmod +x "ai_studio_code (5).sh"
            echo "🚀 تشغيل السكربت لملء الملفات..."
            bash "ai_studio_code (5).sh"
          else
            echo "⚠️ السكربت غير موجود! تأكد من وجوده في جذر المشروع."
            exit 1
          fi

      - name: 📦 التحقق من الملفات بعد الملء
        run: |
          echo "📄 محتويات مجلد AI بعد الملء:"
          ls -la lib/core/ai/ || echo "❌ مجلد AI غير موجود!"
          echo "📄 التحقق من حجم gemini_service.dart:"
          wc -c lib/core/ai/gemini_service.dart || echo "❌ الملف غير موجود!"

      - name: 📦 تثبيت مكتبات Flutter
        run: |
          flutter clean
          flutter pub get

      - name: 🏗️ بناء APK (Release)
        run: |
          flutter build apk --release --split-per-abi

      - name: 📤 رفع الـ APK كـ Artifact (للتحميل)
        uses: actions/upload-artifact@v4
        with:
          name: mirage-apk-multi-abi
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  # ============================================================
  # 🚀 DEPLOY (النشر - تقرير نهائي)
  # ============================================================
  deploy:
    name: 🚀 DEPLOY
    runs-on: ubuntu-latest
    needs: build-apk
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: 📝 إنشاء تقرير النصر
        run: |
          echo "## 🗡️ تقرير بناء ميراج - OODA Loop" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| المرحلة | الحالة |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌌 Observe & Orient | ✅ تم التجهيز" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Build APK | ✅ ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "| 📤 Artifacts | جاهز للتحميل" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ تم بناء APK بنجاح! حمّله من قسم Artifacts.**" >> $GITHUB_STEP_SUMMARY
          echo "⚡ UFO Albarq Hybrid Cloud sync completed. 🌌" >> $GITHUB_STEP_SUMMARY
