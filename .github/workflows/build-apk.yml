name: ⚡ البارق الحقيقي - OODA APK Builder

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: 📱 BUILD APK (مستقر)
    runs-on: ubuntu-latest

    steps:
      - name: 🌀 سحب الكود
        uses: actions/checkout@v6

      - name: ☕ إعداد Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: 🦋 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: 🗡️ تشغيل سيف الخلق
        run: |
          echo "🔍 البحث عن سيف الخلق..."
          if [ -f "ai_studio_code (5).sh" ]; then
            echo "✅ تم العثور على السكربت"
            chmod +x "ai_studio_code (5).sh"
            bash "ai_studio_code (5).sh"
          else
            echo "⚠️ السكربت غير موجود، إنشاء ملفات بديلة..."
            mkdir -p lib/core/ai lib/core/env lib/providers lib/screens
            cat > lib/main.dart << 'EOF'
            import 'package:flutter/material.dart';
            void main() => runApp(MyApp());
            class MyApp extends StatelessWidget {
              @override
              Widget build(BuildContext context) {
                return MaterialApp(
                  home: Scaffold(
                    body: Center(
                      child: Text('Mirage Tactical'),
                    ),
                  ),
                );
              }
            }
            EOF
          fi

      - name: 📂 التحقق من الملفات
        run: |
          echo "📄 محتويات مجلد lib:"
          ls -la lib/ || echo "⚠️ مجلد lib غير موجود!"
          echo "📄 محتويات pubspec.yaml:"
          head -10 pubspec.yaml || echo "⚠️ pubspec.yaml غير موجود!"

      - name: 📦 تثبيت المكتبات
        run: |
          flutter clean
          flutter pub get

      - name: 🏗️ بناء APK
        run: flutter build apk --release --split-per-abi

  - name: 📤 رفع APK
  uses: actions/upload-artifact@v6
  with:
    name: mirage-apk-final
    path: build/app/outputs/flutter-apk/*.apk
    retention-days: 30
