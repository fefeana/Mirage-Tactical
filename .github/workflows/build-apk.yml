                (960 - r, 540 - r//2, 960 + r, 540 + r//2),
                outline=(255, 215, 0, alpha),
                width=3
            )
        
        # نصوص الشعار
        draw.text((780, 340), "🏯", fill=(255, 215, 0), size=200)
        draw.text((660, 590), "ميراج-تكتيكال", fill=(255, 215, 0), size=90)
        draw.text((670, 710), "الدرع الرقمي الجديد", fill=(180, 180, 210), size=50)
        
