name: 🎬 Mirage Pipeline

on:
  push:
    branches: [ "promo-video-v2" ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gTTS moviepy numpy

      - name: Run Video Generator
        run: |
          python mirage_video_builder.py 







          
