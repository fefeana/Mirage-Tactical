"""
مولد فيديو احترافي لتطبيق ميراج-تكتيكال.
يعمل محلياً أو عبر GitHub Actions مع تثبيت ذاتي للمكتبات.
"""

import sys
import subprocess
import importlib
from typing import List, Dict, Any, Optional, Tuple
from pathlib import Path
import numpy as np
from PIL import Image, ImageDraw, ImageFont
from moviepy.editor import ImageClip, concatenate_videoclips, vfx, CompositeVideoClip, TextClip

# ===================================================================
# 📦 إدارة الحزم (Packages)
# ===================================================================

class PackageManager:
    """مدير الحزم الذكي: يتحقق، يثبت، ويحدث المكتبات تلقائياً."""
    
    REQUIRED = {
        "pillow": "PIL",
        "moviepy": "moviepy",
        "numpy": "numpy",
    }
    
    @classmethod
    def ensure(cls) -> None:
        """يتحقق من وجود المكتبات ويقوم بتثبيتها أو تحديثها."""
        print("📦 جارٍ التحقق من المكتبات المطلوبة...")
        for package, import_name in cls.REQUIRED.items():
            try:
                importlib.import_module(import_name)
                print(f"   ✅ {package} موجود")
            except ImportError:
                print(f"   📥 {package} غير موجود، جارٍ التثبيت...")
                subprocess.check_call([sys.executable, "-m", "pip", "install", package])
            
            print(f"   🔄 تحديث {package}...")
            subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", package])
        print("✅ جميع المكتبات جاهزة!")

# ===================================================================
# 🎨 المشاهد (Scenes)
# ===================================================================

class Scene:
    """فئة تمثل مشهداً واحداً في الفيديو."""
    
    def __init__(self, name: str, creator, duration: float = 3.0, transition: str = "fade"):
        self.name = name
        self.creator = creator
        self.duration = duration
        self.transition = transition
    
    def create_frame(self) -> Image.Image:
        """تُنشئ إطار المشهد."""
        return self.creator()
    
    def __repr__(self) -> str:
        return f"Scene(name='{self.name}', duration={self.duration}s)"

class SceneBuilder:
