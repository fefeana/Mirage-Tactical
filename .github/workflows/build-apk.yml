name: 📱 Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          sudo apt update
          pip install pillow moviepy numpy requests

      - name: 🎬 Generate promo video
        run: python create_full_promo.py

      - name: 📤 Upload video
        uses: actions/upload-artifact@v4
        with:
          name: promo-video
          path: mirage_promo.mp4
