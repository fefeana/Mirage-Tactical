#!/usr/bin/env python3
# ===================================================================
# ⚡ ميراج-تكتيكال - مولد الفيديو الإعلاني (النسخة النهائية) ⚡
# ===================================================================

"""
هذا السكربت يُنشئ فيديو إعلانياً احترافياً لتطبيق ميراج-تكتيكال.
يعمل محلياً أو عبر GitHub Actions، ويُثبت المكتبات تلقائياً.
"""

import sys
import subprocess
import importlib
from typing import List, Tuple
import numpy as np
from PIL import Image, ImageDraw
from moviepy.editor import ImageClip, concatenate_videoclips, vfx

# ===================================================================
# 📦 إدارة المكتبات (تثبيت وتحديث ذاتي)
# ===================================================================

REQUIRED_PACKAGES = [
    ("pillow", "PIL"),
    ("moviepy", "moviepy"),
    ("numpy", "numpy"),
]

def ensure_packages():
    """يتحقق من وجود المكتبات المطلوبة، ويُثبتها أو يُحدثها إذا لزم الأمر."""
    for pkg_name, import_name in REQUIRED_PACKAGES:
        try:
            importlib.import_module(import_name)
            print(f"✅ {pkg_name} موجود")
        except ImportError:
            print(f"📦 {pkg_name} غير موجود، جارٍ التثبيت...")
            subprocess.check_call([sys.executable, "-m", "pip", "install", pkg_name])
        print(f"🔄 تحديث {pkg_name}...")
        subprocess.check_call([sys.executable, "-m", "pip", "install", "--upgrade", pkg_name])

# تشغيل التحقق فوراً
ensure_packages()

# ===================================================================
# 🎨 المشاهد (Scene Creators)
# ===================================================================

class Scene:
    """فئة تمثل مشهداً واحداً في الفيديو."""
    def __init__(self, name: str, creator, duration: float = 3.0):
        self.name = name
        self.creator = creator
        self.duration = duration

    def create(self) -> Image.Image:
        """تُنشئ صورة المشهد."""
        return self.creator()

# دوال إنشاء المشاهد
def intro_scene():
    """المشهد الافتتاحي: شعار ميراج يتوهج."""
    img = Image.new("RGB", (1920, 1080), (5, 5, 20))
    draw = ImageDraw.Draw(img)
    for r in range(100, 500, 30):
        draw.ellipse((960 - r, 540 - r//2, 960 + r, 540 + r//2),
                     outline=(255, 215, 0, max(0, 100 - r//5)), width=3)
    draw.text((780, 350), "🏯", fill=(255, 215, 0), size=200)
    draw.text((660, 600), "ميراج-تكتيكال", fill=(255, 215, 0), size=90)
    draw.text((670, 720), "الدرع الرقمي الجديد", fill=(180, 180, 200), size=50)
    return img

def threat_scene():
    """مشهد التهديد: هجمات إلكترونية."""
    img = Image.new("RGB", (1920, 1080), (10, 0, 0))
    draw = ImageDraw.Draw(img)
    for i in range(0, 1920, 40):
        draw.line((i, 0, i + np.random.randint(-100, 100), 1080), fill=(200, 0, 0, 80), width=2)
        draw.line((0, i, 1920, i + np.random.randint(-100, 100)), fill=(200, 0, 0, 80), width=2)
    draw.text((200, 300), "⚠️ تهديد إلكتروني", fill=(255, 50, 50), size=80)
    draw.text((200, 450), "هجوم احتيال", fill=(255, 200, 200), size=60)
    draw.text((200, 580), "اكتشاف محاولة اختراق", fill=(200, 100, 100), size=40)
    return img

def ai_scene():
    """مشهد الذكاء الاصطناعي: التحليل الفوري."""
    img = Image.new("RGB", (1920, 1080), (0, 10, 30))
    draw = ImageDraw.Draw(img)
    draw.rectangle((150, 150, 1770, 930), outline=(0, 200, 255), width=4)
    draw.text((250, 220), "🧠 الذكاء الفائق", fill=(0, 200, 255), size=60)
    draw.text((250, 330), "تحليل التهديد...", fill=(100, 200, 255), size=45)
    draw.text((250, 440), "✅ كشف الاحتيال", fill=(0, 255, 100), size=70)
    draw.text((250, 560), "🛡️ بدء الإجراءات الوقائية", fill=(0, 200, 255), size=45)
    return img

def enterprise_scene():
    """مشهد المؤسسات: الأمان المؤسسي."""
    img = Image.new("RGB", (1920, 1080), (10, 0, 30))
    draw = ImageDraw.Draw(img)
    draw.rectangle((100, 100, 1820, 980), outline=(255, 215, 0), width=6)
    draw.text((200, 200), "🏛️ نظام المؤسسات", fill=(255, 215, 0), size=60)
    draw.text((200, 320), "🔐 FIDO2: مفعّل", fill=(0, 255, 200), size=55)
    draw.text((200, 440), "⏳ TOTP: جاهز", fill=(0, 255, 200), size=55)
    draw.text((200, 560), "🛡️ Zero Trust: مُفعّل", fill=(0, 255, 200), size=55)
    draw.ellipse((1500, 650, 1780, 930), outline=(0, 255, 200), width=8)
    draw.text((1600, 750), "✓", fill=(0, 255, 200), size=130)
    return img

def cta_scene():
    """مشهد الدعوة: حمّل الآن."""
    img = Image.new("RGB", (1920, 1080), (0, 0, 0))
    draw = ImageDraw.Draw(img)
    for r in range(50, 700, 50):
        draw.ellipse((960 - r, 540 - r//2, 960 + r, 540 + r//2),
                     outline=(255, 215, 0, max(0, 80 - r//10)), width=2)
    draw.text((560, 300), "🚀 حمّل ميراج-تكتيكال الآن", fill=(255, 215, 0), size=85)
    draw.text((620, 500), "وكن أنت الساموراي القادم", fill=(200, 200, 200), size=60)
    draw.text((880, 750), "⚡", fill=(255, 215, 0), size=150)
    return img

# قائمة المشاهد (بالترتيب)
SCENES = [
    Scene("Intro", intro_scene),
    Scene("Threat", threat_scene),
    Scene("AI", ai_scene),
    Scene("Enterprise", enterprise_scene),
    Scene("Call to Action", cta_scene),
]

# ===================================================================
# 🎬 محرك الفيديو
# ===================================================================

def create_video(scenes: List[Scene], output_file: str = "mirage_promo.mp4", fps: int = 24) -> str:
    """يُحوّل قائمة المشاهد إلى فيديو واحد مع انتقالات سلسة."""
    print("🎬 جارٍ إنشاء الفيديو الإعلاني...")
    clips = []

    for i, scene in enumerate(scenes):
        print(f"   - معالجة المشهد: {scene.name}")
        frame = np.array(scene.create())
        clip = ImageClip(frame).set_duration(scene.duration)

        # إضافة تأثيرات انتقالية
        if i == 0:
            clip = clip.fx(vfx.fadein, 0.7)
        elif i == len(scenes) - 1:
            clip = clip.fx(vfx.fadeout, 0.7)
        else:
            clip = clip.fx(vfx.fadein, 0.3).fx(vfx.fadeout, 0.3)

        clips.append(clip)

    final = concatenate_videoclips(clips)
    print(f"💾 حفظ الفيديو كـ {output_file}...")
    final.write_videofile(output_file, fps=fps, codec="libx264", audio_codec="aac")
    return output_file

# ===================================================================
# 🚀 المدخل الرئيسي
# ===================================================================

def main():
    """المدخل الرئيسي للسكربت."""
    print("=" * 60)
    print("⚡ ميراج-تكتيكال - مولد الفيديو الإعلاني")
    print("=" * 60)
    print(f"📂 عدد المشاهد: {len(SCENES)}")
    for scene in SCENES:
        print(f"   - {scene.name} (مدة {scene.duration} ثانية)")

    output = create_video(SCENES)
    print("=" * 60)
    print(f"✅ تم إنشاء الفيديو بنجاح: {output}")
    print("📺 استمتع بالمشاهدة!")

if __name__ == "__main__":
    main()
