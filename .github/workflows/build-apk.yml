# ===================================================================
# ⚡ ميراج-تكتيكال - سير عمل بناء وتوليد الفيديو السينمائي ⚡
# ===================================================================

name: 🎬 Generate Cinematic Promo Video

on:
  workflow_dispatch:  # تشغيل يدوي من GitHub Actions

jobs:
  cinematic-video:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------
      # 📥 الخطوة 1: تحميل الكود من المستودع
      # -----------------------------------------------------------------
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # 🐍 الخطوة 2: إعداد بيئة Python
      # -----------------------------------------------------------------
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # -----------------------------------------------------------------
      # 📦 الخطوة 3: تثبيت المكتبات المطلوبة
      # -----------------------------------------------------------------
      - name: 📦 Install dependencies
        run: |
          echo "📦 جارٍ تثبيت المكتبات المطلوبة..."
          pip install pillow moviepy numpy

      # -----------------------------------------------------------------
      # 🎬 الخطوة 4: تشغيل سكربت توليد الفيديو السينمائي
      # -----------------------------------------------------------------
      - name: 🎬 Generate cinematic promo video
        run: |
          echo "🎬 جارٍ تشغيل سكربت الفيديو السينمائي..."
          python video_generator.py

      # -----------------------------------------------------------------
      # 📤 الخطوة 5: رفع الفيديو الناتج كقطعة أثرية (مع تحسينات)
      # -----------------------------------------------------------------
      - name: 📤 Upload cinematic video
        uses: actions/upload-artifact@v4
        with:
          name: cinematic-promo-video
          path: mirage_cinematic.mp4
          retention-days: 90   # الاحتفاظ بالفيديو لمدة 90 يوماً






