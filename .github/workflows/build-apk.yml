# ===================================================================
# ⚡ ميراج-تكتيكال - سير العمل النهائي لتوليد الفيديو الإعلاني 🎬
# ===================================================================
name: 🎬 Mirage Promo Video Generator

on:
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # تثبيت FFmpeg الأساسي لمعالجة وتصدير الفيديو عبر MoviePy
      - name: 🎬 Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # تثبيت حزم بايثون المعتمدة للمشروع
      - name: 📦 Install Python dependencies
        run: |
          pip install pillow moviepy numpy

      # تشغيل سكربت توليد الفيديو الإعلاني لـ Mirage
      - name: 🎬 Generate Mirage Promo Video
        run: python video_generator.py

      # رفع الفيديو كملف مخرج (Artifact) للحفظ والتحميل
      - name: 📤 Upload Promo Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirage-promo-video
          path: mirage_promo_pro.mp4
          retention-days: 90
