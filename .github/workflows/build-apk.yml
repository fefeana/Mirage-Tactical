# ===================================================================
# 🎬 محرك الفيديو (Video Engine)
# ===================================================================

class VideoEngine:
    """محرك توليد الفيديو: يحول المشاهد إلى فيديو احترافي."""
    
    def __init__(self, fps: int = 24, output: str = "mirage_promo.mp4"):
        self.fps = fps
        self.output = output
        self.scenes: List[Scene] = []
    
    def add_scene(self, scene: Scene) -> None:
        """يضيف مشهداً إلى قائمة المشاهد."""
        self.scenes.append(scene)
    
    def add_scenes(self, scenes: List[Scene]) -> None:
        """يضيف قائمة مشاهد دفعة واحدة."""
        self.scenes.extend(scenes)
    
    def render(self) -> str:
        """يُحوّل جميع المشاهد إلى فيديو واحد."""
        print(f"🎬 جارٍ إنشاء الفيديو ({len(self.scenes)} مشاهد)...")
        clips = []
        
        for i, scene in enumerate(self.scenes):
            print(f"   - معالجة المشهد: {scene.name} (مدة {scene.duration} ثانية)")
            frame = np.array(scene.create_frame())
            clip = ImageClip(frame).set_duration(scene.duration)
            
            # إضافة تأثيرات انتقالية حسب نوع المشهد
            if i == 0:
                clip = clip.fx(vfx.fadein, 0.7)
            elif i == len(self.scenes) - 1:
                clip = clip.fx(vfx.fadeout, 0.7)
            else:
                clip = clip.fx(vfx.fadein, 0.3).fx(vfx.fadeout, 0.3)
            
            clips.append(clip)
        
        print("💾 جارٍ حفظ الفيديو...")
        final = concatenate_videoclips(clips)
        final.write_videofile(
            self.output,
            fps=self.fps,
            codec="libx264",
            audio_codec="aac",
            bitrate="6000k",
            threads=4
        )
        print(f"✅ تم إنشاء الفيديو: {self.output}")
        return self.output

# ===================================================================
# 🚀 المدخل الرئيسي
# ===================================================================

def main():
    """تشغيل المولد الرئيسي."""
    print("=" * 65)
    print("⚡ ميراج-تكتيكال - مولد الفيديو الإعلاني (النسخة الذهبية)")
    print("=" * 65)
    
    # 1. التحقق من المكتبات
    PackageManager.ensure()
    
    # 2. بناء المشاهد
    builder = SceneBuilder()
    scenes = [
        Scene("الافتتاحية", builder.intro, duration=3.5),
        Scene("التهديد", builder.threat, duration=3.0),
        Scene("الذكاء الاصطناعي", builder.ai_analysis, duration=3.5),
        Scene("المؤسسات", builder.enterprise, duration=3.5),
        Scene("الدعوة", builder.call_to_action, duration=3.0),
    ]
    
    # 3. تشغيل محرك الفيديو
    engine = VideoEngine(fps=24, output="mirage_promo.mp4")
    engine.add_scenes(scenes)
    output = engine.render()
    
    print("=" * 65)
    print(f"🎉 تم إنشاء الفيديو بنجاح: {output}")
    print("📺 شاهد الفيديو واستمتع!")
    print("=" * 65)
    return output

if __name__ == "__main__":
    main()
