function normalizeCode(code, spaces = 2) {
  const lines = code.split('\n');
  let indentLevel = 0;

  return lines.map(line => {
    // إزالة المسافات الزائدة
    let trimmed = line.trim();

    // تقليل مستوى التباعد عند إغلاق الأقواس
    if (trimmed.startsWith('}') || trimmed.endsWith('}')) {
      indentLevel = Math.max(indentLevel - 1, 0);
    }

    // بناء السطر بالمسافات الصحيحة
    const newLine = ' '.repeat(indentLevel * spaces) + trimmed;

    // زيادة مستوى التباعد عند فتح الأقواس
    if (trimmed.endsWith('{')) {
      indentLevel++;
    }

    return newLine;
  }).join('\n');
}

// 🛠️ مثال استخدام
const rawCode = `
function test() {
console.log("Hello");
if(true){
console.log("World");
}
}
`;

console.log(normalizeCode(rawCode, 2));
