name: Mirage Pulse - Living UI (Cloud Native)
on:
  schedule:
    - cron: '0 */3 * * *'  # كل 3 ساعات
  workflow_dispatch:

jobs:
  update-living-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ONLY Web Source
        uses: actions/checkout@v4
        with:
          # نستخرج فقط مجلد الواجهة (public/ و src/ لو موجودين)
          sparse-checkout: |
            public
            src
            index.html
            vite.config.ts
            package.json
            package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Auto-Fix Security (Web Only)
        run: |
          npm ci
          npm audit fix --force || true
          npm run build  # ينتج مجلد dist/ يحتوي على الواجهة الجديدة

      # 🔥 النشر الذكي (لا علاقة له بـ Android إطلاقاً)
      - name: Deploy to Firebase Hosting (Dynamic Web)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIRAGE }}'
          channelId: live
          entryPoint: './dist'  # ننشر الويب فقط

      - name: Notify APK to Refresh Cache (Remote Config)
        run: |
          # نُحدّث قيمة في Firebase Remote Config أو Firestore
          # ليقرأها الـ APK عند فتحه، فيسحب آخر نسخة من الويب
          curl -X POST "https://your-cloud-function.com/update-ui-version" \
               -H "Authorization: Bearer ${{ secrets.CLOUD_FUNC_KEY }}" \
               -d '{"version": "'$(date +%s)'"}'
