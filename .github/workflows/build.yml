name: Symphony Mirage - UFO Albarq Build Pipeline OODA ⚡🌌

on:
  push:
    branches: [ "main", "orchestration" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  observe-and-orient:
    name: 🌌 OBSERVE & ORIENT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: AI Sentinel Audit
        run: npm run lint || true

  decide-and-build:
    name: ⚡ DECIDE & BUILD
    runs-on: ubuntu-latest
    needs: observe-and-orient
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Omni-Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: mirage-web
          path: dist/
          retention-days: 30

  build-apk:
    name: 📱 BUILD APK
    runs-on: ubuntu-latest
    needs: observe-and-orient
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirage-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  deploy:
    name: 🚀 DEPLOY
    runs-on: ubuntu-latest
    needs: [decide-and-build, build-apk]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: mirage-web
          path: dist/

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --non-interactive --project ufo-albarq-mirage || echo "Firebase skipped"

      - name: Activate OODA Loop
        run: echo "✅ UFO Albarq Hybrid Cloud sync completed. ⚡🌌"
